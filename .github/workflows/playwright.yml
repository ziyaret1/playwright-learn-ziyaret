name: Playwright Tests

on:
    push:
        branches: [ziyaret/allure]
    pull_request:
        branches: [main]

jobs:
    test:
        timeout-minutes: 60
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps

            - name: Run Playwright tests
              run: npx playwright test

            - name: Check if allure-results exists
              run: ls -la ./allure-results || echo "No allure-results found!"

            - name: Upload Allure Results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: allure-results
                  path: ./allure-results
                  retention-days: 30

            - name: Install Allure CLI
              run: npm install -g allure-commandline

            - name: Generate Allure Report
              if: always()
              run: npx allure generate ./allure-results --clean -o ./allure-report

            - name: Upload Allure Report (artifact)
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: allure-report
                  path: ./allure-report
                  retention-days: 30

            - name: Deploy Allure Report to GitHub Pages
              if: always()
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./allure-report

            - name: Add Allure Report Link to Summary
              if: always()
              run: |
                echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
                echo "👉 [Open Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
