#! check playwright reports to
name: Playwright Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install chromium

      - name: Run Playwright Tests with HTML & Allure reporters
        run: npx playwright test --reporter=html,allure-playwright --workers=4
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Playwright HTML Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/**

      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/**

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./site/allure-report

      - name: Download Playwright HTML Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: ./site/playwright-report

      - name: List site contents (debug)
        run: ls -R ./site

      - name: Create index.html for reports
        run: |
          echo '<!DOCTYPE html>' > ./site/index.html
          echo '<html><head><meta charset="UTF-8"><title>Test Reports</title></head><body>' >> ./site/index.html
          echo '<h1>📊 Test Reports</h1>' >> ./site/index.html
          echo '<ul>' >> ./site/index.html
          echo '<li><a href="allure-report/index.html">Allure Report</a></li>' >> ./site/index.html
          echo '<li><a href="playwright-report/index.html">Playwright HTML Report</a></li>' >> ./site/index.html
          echo '</ul>' >> ./site/index.html
          echo '</body></html>' >> ./site/index.html

      - name: Deploy Reports to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

